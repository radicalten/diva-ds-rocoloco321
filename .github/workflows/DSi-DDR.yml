name: DSi-DDR
on:
  push:
    branches:
    - master
jobs:
  build-nds:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install BlockDS
      run: |
        # 1. Clone the BlockDS SDK and its submodules (libnds, libfat, maxmod, etc.)
        git clone --recursive https://github.com/blocksds/sdk.git /opt/blocksds
        # 2. Add devkitARM's compiler to the PATH so BlockDS can find it
        export PATH=/opt/devkitpro/devkitARM/bin:$PATH
        # 3. Compile the BlockDS libraries and host tools (grit, mmutil, etc.)
        cd /opt/blocksds
        make -j$(nproc)
    - name: Compile
      run: |
        make -f Makefile
    - name: Upload
      uses: actions/upload-artifact@v6
      with:
        name: dsi-DDR
        path: |
          *.nds

name: DSi-DDR
on:
  push:
    branches:
    - master
jobs:
  build-nds:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install BlocksDS
      run: |
        dkp-pacman -Sy --noconfirm blocksds
        echo "BLOCKSDS=${DEVKITPRO}/blocksds" >> $GITHUB_ENV  
    - name: Compile
      run: |
        make -f Makefile
    - name: Upload
      uses: actions/upload-artifact@v6
      with:
        name: dsi-DDR
        path: |
          *.nds
